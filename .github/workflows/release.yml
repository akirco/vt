name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libavdevice-dev

      - name: Install system dependencies (macOS x86_64 cross)
        if: matrix.os == 'macos-latest'
        run: |
          softwareupdate --install-rosetta --agree-to-license || true
          arch -x86_64 /usr/local/bin/brew install pkg-config ffmpeg || true
          arch -x86_64 pkg-config --libs libavcodec

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig

      - name: Package
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp target/${{ matrix.target }}/release/vt.exe release/vt.exe
            7z a vt-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip -r release/*
          else
            cp target/${{ matrix.target }}/release/vt release/vt
            tar -czvf vt-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C release vt
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            vt-*.tar.gz
            vt-*.zip

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
