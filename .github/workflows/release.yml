name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get purge -y libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev libasound2-dev || true
          sudo apt-get install -y \
            pkg-config \
            nasm \
            cmake \
            libclang-dev \
            build-essential \
            libasound2-dev \
            libdav1d-dev

      - name: Build (static FFmpeg + dav1d)
        env:
          FFMPEG_CONFIGURE_FLAGS: "--enable-libdav1d"
        run: cargo build --release

      - name: Verify static
        run: ldd target/release/vt | grep "libav" || echo "Static OK"

      - name: Package
        run: |
          mkdir -p release
          cp target/release/vt release/vt
          tar -czvf vt-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz -C release vt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: vt-*.tar.gz

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
